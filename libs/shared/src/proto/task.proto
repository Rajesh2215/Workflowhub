syntax = "proto3";
package task;

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (TaskResponse);
  rpc GetTasks (GetTasksRequest) returns (TaskListResponse);
  rpc CreateSaga (CreateSagaRequest) returns (TaskResponse);
  rpc DeleteSaga (DeleteSagaRequest) returns (DeleteSagaResponse);
}

message CreateTaskRequest {
  string userId = 1;
  string title = 2;
  string description = 3;
}

message GetTasksRequest {
  string userId = 1;
}

message CreateSagaRequest {
  string userId = 1;
  string title = 2;
  string description = 3;
}

message DeleteSagaRequest {
  string taskId = 1;
}

message DeleteSagaResponse {
  bool success = 1;
  string message = 2;
}

message TaskResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string userId = 4;
  string message = 5;
}

message TaskListResponse {
  string message = 1;
  repeated TaskResponse tasks = 2;
}
